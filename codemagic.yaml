workflows:
  ios-testflight:
    name: iOS TestFlight build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.settlia.pwa
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "app.settlia.pwa"
        APP_APPLE_ID: "6787267468"
    integrations:
      app_store_connect: codemagic_appstore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd $CM_BUILD_DIR/ios/App
          # Build number derivado del tiempo (minutos desde una época fija):
          # siempre creciente, siempre único, y sin depender de
          # get-latest-*-build-number, que devolvía valores erróneos (encontraba
          # "1" aunque ya existiera el build 2) y provocaba colisiones 409 al
          # reintentar el mismo número. Queda holgadamente por debajo de 2^32.
          BUILD_NUM=$(( ($(date +%s) - 1780000000) / 60 ))
          agvtool new-version -all $BUILD_NUM
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
