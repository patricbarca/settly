name: Build Android release AAB

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "android/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "capacitor.config.ts"
      - ".github/workflows/android-release.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret ANDROID_RELEASE_KEYSTORE_BASE64 — add the 4 Android signing secrets in repo Settings -> Secrets -> Actions before this build can produce a signed AAB."
            exit 1
          fi
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build signed release AAB
        working-directory: android
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
            -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
            -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: settlia-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # TODO once Google Play Console is set up: add a service-account JSON
      # secret (ANDROID_PLAY_SERVICE_ACCOUNT_JSON) and a step here using
      # r0adkll/upload-google-play (or similar) to auto-publish to an
      # Internal Testing track, mirroring how Codemagic auto-submits iOS to
      # TestFlight. Until then, download the .aab artifact from this run and
      # upload it to Play Console manually.
